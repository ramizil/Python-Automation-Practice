[pytest]
# By default only the worked reference examples run. Exercises (skeletons) are
# run explicitly, e.g.  pytest exercises/01_first_test
testpaths = tests
addopts = -v --tb=short
markers =
    ui: tests that drive a browser UI
    api: tests that hit a REST API directly
    mocks: tests that intercept / stub network traffic
    slow: longer end-to-end flows
