# pre-commit runs fast checks automatically before every `git commit`, so you
# never push un-formatted or broken code. One-time setup (with the Python venv
# active, or pip install pre-commit globally):
#
#   pip install pre-commit
#   pre-commit install            # wire it into this repo's git hooks
#   pre-commit run --all-files    # run everything once, now
#
# After that it runs on the files you stage, every commit.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff           # lint (auto-fixes what it safely can)
        args: [--fix]
        files: ^python-playwright/
      - id: ruff-format    # format
        files: ^python-playwright/
